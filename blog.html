<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Magic Mountain Resort Ke</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header id="main-header" class="scrolled">
        <div class="logo">Magic Mountain</div>
        <nav><ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="blog.html" style="color: var(--accent-gold);">Blog</a></li>
        </ul></nav>
    </header>

    <section style="padding-top: 8rem;">
        <h1 class="section-title">Resort Stories & News</h1>
        
        <div id="blog-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; max-width: 1200px; margin: auto;">
            <!-- Blog posts loaded here -->
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script>
        localforage.getItem('mockDB').then(db => {
            if (db && db.content) {
                const text = db.content['logo_text'] || 'Magic Mountain';
                const img = db.content['logo_image'];
                if (db.content['logo_text'] || db.content['logo_image']) {
                    const html = img ? `<img src="${img}" style="height: 40px; margin-right: 10px; vertical-align: middle;"> ${text}` 
                                     : `<i class="fa-solid fa-mountain-sun"></i> ${text}`;
                    document.querySelectorAll('.logo').forEach(el => el.innerHTML = html);
                }
            }
        });
        const fallbackBlog = [
            { title: 'Top 5 Reasons to Visit Magic Mountain in 2026', content: 'Discover why our luxury resort is the perfect getaway for nature lovers...', image_url: 'https://images.unsplash.com/photo-1540541338287-41700207dee6', created_at: '2026-06-10T10:00:00Z' },
            { title: 'A Culinary Journey at The Peak', content: 'Our head chef reveals the inspiration behind our new fine dining menu...', image_url: 'https://images.unsplash.com/photo-1514933651103-005eec06c04b', created_at: '2026-06-15T10:00:00Z' }
        ];

        async function loadBlog() {
            const container = document.getElementById('blog-container');
            let posts = fallbackBlog;
            try {
                const res = await fetch('/api/blog');
                const data = await res.json();
                if(data && data.length > 0) posts = data;
            } catch (err) {
                const db = await localforage.getItem('mockDB');
                if(db && db.blog && db.blog.length > 0) posts = db.blog;
            }

            container.innerHTML = posts.map(p => `
                <div class="glass" style="border-radius: 10px; overflow: hidden;">
                    <img src="${p.image_url}" alt="${p.title}" style="width: 100%; height: 200px; object-fit: cover;">
                    <div style="padding: 1.5rem;">
                        <p style="color: var(--accent-gold); font-size: 0.8rem; margin-bottom: 0.5rem;">${new Date(p.created_at).toLocaleDateString()}</p>
                        <h3 style="color: var(--primary-green); margin-bottom: 1rem;">${p.title}</h3>
                        <p style="font-size: 0.9rem; line-height: 1.5;">${p.content.substring(0, 100)}...</p>
                        <a href="#" style="display: inline-block; margin-top: 1rem; color: var(--accent-gold); font-weight: bold;">Read More &rarr;</a>
                    </div>
                </div>
            `).join('');
        }
        loadBlog();
    </script>
    <footer>
        <div class="logo"><i class="fa-solid fa-mountain-sun"></i> Magic Mountain</div>
        <p>&copy; 2026 Magic Mountain Resort Ke. All rights reserved.</p>
        <a href="admin.html" class="admin-link">Admin Portal</a>
    </footer>
    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html"><i class="fa-solid fa-home"></i> Home</a>
        <a href="rooms.html"><i class="fa-solid fa-bed"></i> Rooms</a>
        <a href="booking.html"><i class="fa-solid fa-calendar-check"></i> Book</a>
        <a href="gallery.html"><i class="fa-solid fa-images"></i> Gallery</a>
        <a href="contact.html"><i class="fa-solid fa-phone"></i> Contact</a>
    </nav>
</body>
</html>
