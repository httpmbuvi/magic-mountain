<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - Magic Mountain Resort Ke</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .booking-container { max-width: 600px; margin: 8rem auto 4rem; padding: 2rem; border-radius: 10px; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; }
    </style>
</head>
<body>

    <header id="main-header" class="scrolled">
        <div class="logo">Magic Mountain</div>
        <nav><ul class="nav-links"><li><a href="index.html">Home</a></li></ul></nav>
    </header>

    <div class="booking-container glass">
        <h2 style="text-align: center; color: var(--primary-green); margin-bottom: 2rem; font-family: 'Playfair Display', serif;">Reserve Your Stay</h2>
        <form id="booking-form">
            <div class="form-group">
                <label>Select Room</label>
                <select id="room_id" required><option value="">Loading rooms...</option></select>
            </div>
            <div class="form-group"><label>Full Name</label><input type="text" id="guest_name" required></div>
            <div class="form-group"><label>Email Address</label><input type="email" id="guest_email" required></div>
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;"><label>Check-in</label><input type="date" id="check_in" required></div>
                <div class="form-group" style="flex: 1;"><label>Check-out</label><input type="date" id="check_out" required></div>
            </div>
            <div class="form-group"><label>Guests</label><input type="number" id="guests_count" min="1" max="10" value="2" required></div>
            <button type="submit" class="btn-primary" style="width: 100%;">Submit Reservation</button>
            <p id="booking-msg" style="text-align: center; margin-top: 1rem; font-weight: bold;"></p>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script>
        localforage.getItem('mockDB').then(db => {
            if (db && db.content) {
                const text = db.content['logo_text'] || 'Magic Mountain';
                const img = db.content['logo_image'];
                if (db.content['logo_text'] || db.content['logo_image']) {
                    const html = img ? `<img src="${img}" style="height: 40px; margin-right: 10px; vertical-align: middle;"> ${text}` 
                                     : `<i class="fa-solid fa-mountain-sun"></i> ${text}`;
                    document.querySelectorAll('.logo').forEach(el => el.innerHTML = html);
                }
            }
        });
        // Load rooms
        async function loadRooms() {
            try {
                const res = await fetch('/api/rooms');
                const rooms = await res.json();
                populateRooms(rooms);
            } catch (err) {
                const db = await localforage.getItem('mockDB');
                if(db && db.rooms) populateRooms(db.rooms);
            }
        }
        function populateRooms(rooms) {
            const select = document.getElementById('room_id');
            select.innerHTML = '<option value="">-- Choose a Room --</option>';
            rooms.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.id; opt.textContent = r.name + ' ($' + r.price + ')';
                select.appendChild(opt);
            });
            const urlParams = new URLSearchParams(window.location.search);
            const roomId = urlParams.get('room');
            if (roomId) select.value = roomId;
        }
        loadRooms();

        document.getElementById('booking-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                guest_name: document.getElementById('guest_name').value,
                guest_email: document.getElementById('guest_email').value,
                room_id: document.getElementById('room_id').value,
                check_in: document.getElementById('check_in').value,
                check_out: document.getElementById('check_out').value
            };
            const msgEl = document.getElementById('booking-msg');
            try {
                const res = await fetch('/api/bookings', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
                });
                if (res.ok) {
                    msgEl.style.color = 'green';
                    msgEl.innerText = 'Reservation submitted successfully! We will contact you soon.';
                    e.target.reset();
                } else {
                    throw new Error('Server error');
                }
            } catch (err) {
                let db = await localforage.getItem('mockDB');
                if (!db) db = { rooms: [], bookings: [], blog: [], events: [], testimonials: [], gallery: [], content: {} };
                data.id = Date.now();
                data.status = 'Pending';
                const room = db.rooms.find(r => r.id == data.room_id);
                data.room_name = room ? room.name : 'Unknown Room';
                db.bookings.push(data);
                await localforage.setItem('mockDB', db);
                msgEl.style.color = 'green';
                msgEl.innerText = 'Reservation submitted locally! (Mock Backend)';
                e.target.reset();
            }
        });
    </script>
    <footer>
        <div class="logo"><i class="fa-solid fa-mountain-sun"></i> Magic Mountain</div>
        <p>&copy; 2026 Magic Mountain Resort Ke. All rights reserved.</p>
        <a href="admin.html" class="admin-link">Admin Portal</a>
    </footer>
    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html"><i class="fa-solid fa-home"></i> Home</a>
        <a href="rooms.html"><i class="fa-solid fa-bed"></i> Rooms</a>
        <a href="booking.html" class="active"><i class="fa-solid fa-calendar-check"></i> Book</a>
        <a href="gallery.html"><i class="fa-solid fa-images"></i> Gallery</a>
        <a href="contact.html"><i class="fa-solid fa-phone"></i> Contact</a>
    </nav>
</body>
</html>
