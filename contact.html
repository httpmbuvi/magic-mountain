<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Magic Mountain Resort Ke</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header id="main-header" class="scrolled">
        <div class="logo">Magic Mountain</div>
        <nav><ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="contact.html" style="color: var(--accent-gold);">Contact Us</a></li>
        </ul></nav>
    </header>

    <section style="padding-top: 8rem; max-width: 1200px; margin: auto;">
        <h1 class="section-title">Get in Touch</h1>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem;">
            
            <div class="glass" style="padding: 2rem; border-radius: 10px;">
                <h2 style="color: var(--primary-green); margin-bottom: 1.5rem;">Contact Information</h2>
                <p style="margin-bottom: 1rem;"><i class="fa-solid fa-phone" style="color: var(--accent-gold); width: 30px;"></i> <span id="contact-phone">+254 700 000 000</span></p>
                <p style="margin-bottom: 1rem;"><i class="fa-solid fa-envelope" style="color: var(--accent-gold); width: 30px;"></i> <span id="contact-email">info@magicmountain.co.ke</span></p>
                <p style="margin-bottom: 1rem;"><i class="fa-solid fa-location-dot" style="color: var(--accent-gold); width: 30px;"></i> Magic Mountain Road, Kenya</p>
                
                <h3 style="margin-top: 2rem; margin-bottom: 1rem;">Follow Us</h3>
                <div style="display: flex; gap: 1rem; font-size: 1.5rem;">
                    <a href="#" style="color: var(--primary-green);"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#" style="color: var(--primary-green);"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" style="color: var(--primary-green);"><i class="fa-brands fa-twitter"></i></a>
                </div>
            </div>

            <div class="glass" style="padding: 2rem; border-radius: 10px;">
                <h2 style="color: var(--primary-green); margin-bottom: 1.5rem;">Send a Message</h2>
                <form>
                    <div style="margin-bottom: 1rem;">
                        <input type="text" placeholder="Your Name" style="width: 100%; padding: 0.8rem; border-radius: 5px; border: 1px solid #ccc;" required>
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <input type="email" placeholder="Your Email" style="width: 100%; padding: 0.8rem; border-radius: 5px; border: 1px solid #ccc;" required>
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <textarea rows="5" placeholder="Your Message" style="width: 100%; padding: 0.8rem; border-radius: 5px; border: 1px solid #ccc;" required></textarea>
                    </div>
                    <button type="button" class="btn-primary" style="width: 100%;">Send Message</button>
                </form>
            </div>
            
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script>
        localforage.getItem('mockDB').then(db => {
            if (db && db.content) {
                const text = db.content['logo_text'] || 'Magic Mountain';
                const img = db.content['logo_image'];
                if (db.content['logo_text'] || db.content['logo_image']) {
                    const html = img ? `<img src="${img}" style="height: 40px; margin-right: 10px; vertical-align: middle;"> ${text}` 
                                     : `<i class="fa-solid fa-mountain-sun"></i> ${text}`;
                    document.querySelectorAll('.logo').forEach(el => el.innerHTML = html);
                }
            }
        });
        fetch('/api/content').then(r => r.json()).then(data => {
            if(data['phone']) document.getElementById('contact-phone').innerText = data['phone'];
            if(data['email']) document.getElementById('contact-email').innerText = data['email'];
        }).catch(async e => {
            const db = await localforage.getItem('mockDB');
            if(db && db.content) {
                if(db.content['phone']) document.getElementById('contact-phone').innerText = db.content['phone'];
                if(db.content['email']) document.getElementById('contact-email').innerText = db.content['email'];
            }
        });
    </script>
    <footer>
        <div class="logo"><i class="fa-solid fa-mountain-sun"></i> Magic Mountain</div>
        <p>&copy; 2026 Magic Mountain Resort Ke. All rights reserved.</p>
        <a href="admin.html" class="admin-link">Admin Portal</a>
    </footer>
    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html"><i class="fa-solid fa-home"></i> Home</a>
        <a href="rooms.html"><i class="fa-solid fa-bed"></i> Rooms</a>
        <a href="booking.html"><i class="fa-solid fa-calendar-check"></i> Book</a>
        <a href="gallery.html"><i class="fa-solid fa-images"></i> Gallery</a>
        <a href="contact.html" class="active"><i class="fa-solid fa-phone"></i> Contact</a>
    </nav>
</body>
</html>
